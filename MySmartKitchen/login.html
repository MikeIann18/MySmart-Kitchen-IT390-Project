<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Smart Kitchen — Login</title>
  <link rel="stylesheet" href="style.css">

  <!-- Login page specific styles kept inline since they are only used on this page -->
  <style>
    /* Centered card container for the login form */
    .login-card {
      max-width: 380px;
      margin: 64px auto;
      background: white;
      border: 1px solid #ddd;
      padding: 48px 40px;
      text-align: center;
    }
    .login-card h2 {
      margin-bottom: 8px;
    }
    .login-card p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    /* Google sign-in button styled to match Google's branding guidelines */
    .google-btn {
      width: 100%;
      padding: 13px;
      background: white;
      color: var(--charcoal);
      border: 1px solid #ccc;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .google-btn:hover {
      border-color: var(--teal);
      background: var(--teal-light);
    }

    /* Error message that appears below the button if sign-in fails -->
    /* Hidden by default, shown by JavaScript when needed */
    .auth-error {
      color: #b94a48;
      background: #fff0f0;
      border-left: 3px solid #e05252;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-top: 16px;
      display: none;
      text-align: left;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Smart Kitchen</h1>
  </header>
  <nav>
    <ul>
      <li><a href="SmartKitchen.html">Home</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="nav-login">
      <a href="login.html" class="login-btn">Login</a>
    </div>
  </nav>

  <main>
    <div class="login-card">
      <h2>Welcome</h2>
      <p>Sign in to access your personalized recipes</p>

      <!-- Google sign-in button with Google logo as an SVG icon -->
      <button class="google-btn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908C16.658 14.148 17.64 11.84 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <!-- Error message container thats hidden until sign in fails -->
      <div class="auth-error" id="auth-error"></div>
    </div>
  </main>

  <footer>
    © 2026 My Smart Kitchen | Privacy Notice
  </footer>

  <!-- Firebase authentication logic using the modular SDK -->
  <!-- Imports the Firebase app from firebase-auth.js which holds the config -->
  <script type="module">
    import { app } from "./firebase-auth.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const auth = getAuth(app);

    // If the user is already logged in, skip this page and go straight to home
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = "SmartKitchen.html";
    });

    // Handles the Google sign-in popup when the button is clicked
    // If sign-in fails for any reason other than the user closing the popup, shows an error
    window.handleGoogle = async () => {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
      } catch (e) {
        if (e.code !== "auth/popup-closed-by-user") {
          const el = document.getElementById("auth-error");
          el.textContent = "Sign-in failed. Please try again.";
          el.style.display = "block";
        }
      }
    };
  </script>
</body>
</html>
