<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Smart Kitchen — About</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>My Smart Kitchen</h1>
  </header>

  <nav>
    <ul>
      <li><a href="SmartKitchen.html">Home</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="nav-login">
      <a href="login.html" class="login-btn">Login</a>
    </div>
  </nav>

  <main>
    <div class="page-content">
      <h2>Login</h2>
      <p>Sign in with your Google account to save and access your recipes.</p>
       <!-- This is the only thing added that is different from Sprint 2 which is this actual button and connection to status element   -->
      <button id="google-login-btn" onclick="googleLogin()">Sign in with Google</button>
      <p id="login-status"></p>
    </div>
  </main>

  <footer>
    © 2026 My Smart Kitchen | Privacy Notice
  </footer>

  <script src="script.js"></script>

  <!-- Firebase SDK that loads Google's Firebase libraries from their public CDN, these URL's are the same for everyone using Firebase -->
 <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script>
    // Firebase config — paste your values from Firebase console here
    const firebaseConfig = {
      apiKey: "AIzaSyCZ5wjHyM5zhLEaJKHVXVadTL1nkVuu3aM",
      authDomain: "mysmartkitchen-aa333.firebaseapp.com",
      projectId: "mysmartkitchen-aa333", 
      storageBucket: "mysmartkitchen-aa333.firebasestorage.app", 
      messagingSenderId: "456781151739", 
      appId: "1:456781151739:web:a56215325e6075bec99f5e"
    };

    // Start Firebase
    firebase.initializeApp(firebaseConfig);

    // Google sign-in when button is clicked
    function googleLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider)
        .then((result) => {
          document.getElementById("login-status").textContent =
            "Welcome, " + result.user.displayName + "!";
        })
        .catch((error) => {
          document.getElementById("login-status").textContent =
            "Login failed: " + error.message;
        });
      }

  </script>

</body>
</html>
